<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Book Source Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Newsreader:ital,opsz@0,6..72;1,6..72&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f3ebdd; --paper-2:#ece1cd; --card:#fbf6ec;
    --ink:#2a2118; --ink-soft:#6a5d49; --line:#d8c9ad;
    --ox:#8a3324; --ox-soft:#b5654d; --moss:#4f6f52; --gold:#b07d28; --slate:#3f5a6b;
    --shadow:0 1px 0 #fff inset, 0 2px 6px rgba(60,40,20,.10);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Newsreader",Georgia,serif;font-size:16px;line-height:1.45;
    background-image:radial-gradient(rgba(120,90,50,.04) 1px,transparent 1px);background-size:4px 4px;}
  a{color:var(--ox);text-decoration:none;border-bottom:1px solid var(--ox-soft)}
  a:hover{color:var(--ink)}
  .wrap{max-width:1080px;margin:0 auto;padding:0 18px 80px}

  header{padding:26px 0 14px;border-bottom:2px solid var(--ink);margin-bottom:0}
  .brand{font-family:"Fraunces",serif;font-weight:900;font-size:34px;letter-spacing:-.5px;line-height:1}
  .brand .sub{display:block;font-family:"Spline Sans Mono",monospace;font-weight:500;
    font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--ink-soft);margin-top:8px}
  .meta{font-family:"Spline Sans Mono",monospace;font-size:11.5px;color:var(--ink-soft);margin-top:10px}

  .tabs{display:flex;gap:0;border-bottom:2px solid var(--ink);margin-top:18px}
  .tab{font-family:"Fraunces",serif;font-weight:600;font-size:17px;padding:11px 20px;cursor:pointer;
    border:2px solid transparent;border-bottom:none;background:transparent;color:var(--ink-soft);
    margin-bottom:-2px;border-radius:6px 6px 0 0}
  .tab.on{color:var(--ink);background:var(--card);border-color:var(--ink);border-bottom:2px solid var(--card)}
  .tab .n{font-family:"Spline Sans Mono",monospace;font-size:11px;color:var(--ox);margin-left:6px}

  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:16px 0}
  .chip{font-family:"Spline Sans Mono",monospace;font-size:11.5px;letter-spacing:.5px;text-transform:uppercase;
    padding:6px 12px;border:1.5px solid var(--line);border-radius:20px;background:var(--card);cursor:pointer;color:var(--ink-soft)}
  .chip.on{border-color:var(--ink);color:var(--ink);background:var(--paper-2);font-weight:600}
  .search{flex:1;min-width:160px;font-family:"Newsreader",serif;font-size:15px;padding:7px 12px;
    border:1.5px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink)}
  .btn{font-family:"Spline Sans Mono",monospace;font-size:11.5px;letter-spacing:.5px;text-transform:uppercase;
    padding:7px 13px;border:1.5px solid var(--ink);border-radius:8px;background:var(--ink);color:var(--paper);cursor:pointer}
  .btn.ghost{background:var(--card);color:var(--ink)}

  .card{background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:15px 17px;
    margin-bottom:12px;box-shadow:var(--shadow);position:relative}
  .card h3{font-family:"Fraunces",serif;font-weight:600;font-size:20px;margin:0 0 3px}
  .row{display:flex;flex-wrap:wrap;gap:10px 16px;align-items:baseline}
  .badge{font-family:"Spline Sans Mono",monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;
    padding:3px 8px;border-radius:4px;color:#fff;white-space:nowrap}
  .b-library{background:var(--moss)} .b-estate{background:var(--ox)} .b-lot{background:var(--slate)}
  .b-estate_companies{background:var(--ox)} .b-junk_removal{background:var(--slate)} .b-schools{background:var(--gold)}
  .when{font-family:"Spline Sans Mono",monospace;font-weight:600;font-size:13px;color:var(--ox)}
  .dist{font-family:"Spline Sans Mono",monospace;font-size:12px;color:var(--ink-soft)}
  .stars{color:var(--gold);letter-spacing:2px;font-size:13px}
  .notes{color:var(--ink-soft);font-size:14.5px;margin:7px 0 0;font-style:italic}
  .detail{font-size:14px;margin:6px 0 0}
  .lines{font-family:"Spline Sans Mono",monospace;font-size:12.5px;color:var(--ink-soft);margin-top:6px}
  .lines a{border:none}

  .crm{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line)}
  select,.dt{font-family:"Spline Sans Mono",monospace;font-size:12px;padding:5px 8px;border:1.5px solid var(--line);
    border-radius:7px;background:var(--paper);color:var(--ink)}
  .st-new{} .st-contacted{box-shadow:0 0 0 2px var(--gold) inset}
  .st-replied{box-shadow:0 0 0 2px var(--slate) inset} .st-sourcing{box-shadow:0 0 0 2px var(--moss) inset}
  .st-dead{opacity:.5}
  textarea{font-family:"Newsreader",serif;font-size:14px;width:100%;margin-top:8px;padding:7px 9px;
    border:1.5px solid var(--line);border-radius:7px;background:var(--paper);color:var(--ink);resize:vertical;min-height:38px}
  .copy{font-family:"Spline Sans Mono",monospace;font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;
    padding:5px 10px;border:1.5px solid var(--ox);color:var(--ox);background:transparent;border-radius:7px;cursor:pointer}
  .copy:hover{background:var(--ox);color:#fff}
  .empty{padding:40px;text-align:center;color:var(--ink-soft);font-style:italic}
  .err{background:#fff3ed;border:1.5px solid var(--ox-soft);color:var(--ox);padding:12px 15px;border-radius:8px;
    font-size:14px;margin-top:14px}
  .hint{font-family:"Spline Sans Mono",monospace;font-size:11px;color:var(--ink-soft);margin:2px 0 14px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">The Stockyard<span class="sub">Book Source Dashboard · Coastal Bend</span></div>
    <div class="meta" id="meta">loading…</div>
  </header>

  <div class="tabs">
    <button class="tab on" data-tab="feed">Live Feed<span class="n" id="n-feed"></span></button>
    <button class="tab" data-tab="leads">Outreach Leads<span class="n" id="n-leads"></span></button>
  </div>

  <!-- LIVE FEED -->
  <section id="feed">
    <div class="toolbar">
      <span class="chip on" data-kfilter="all">All</span>
      <span class="chip" data-kfilter="library_sale">Library / Friends</span>
      <span class="chip" data-kfilter="estate_sale">Estate Sales</span>
      <span class="chip" data-kfilter="book_lot">Book Lots</span>
      <input class="search" id="feed-search" placeholder="search title, org, city…">
    </div>
    <div id="feed-list"></div>
  </section>

  <!-- LEADS -->
  <section id="leads" style="display:none">
    <div class="toolbar">
      <span class="chip on" data-cfilter="all">All</span>
      <span class="chip" data-cfilter="estate_companies">Estate Cos</span>
      <span class="chip" data-cfilter="junk_removal">Junk / Haulers</span>
      <span class="chip" data-cfilter="schools">School Libraries</span>
      <input class="search" id="leads-search" placeholder="search name, city, notes…">
      <button class="btn" id="export">⤓ Export leads.json</button>
    </div>
    <div class="hint">Status & notes save in this browser. Hit Export when you want to commit them back to the repo so they persist everywhere.</div>
    <div id="leads-list"></div>
  </section>
</div>

<script>
const PITCH = {
  junk_removal:`Hi [Name], I run a small used-book resale business here in the Corpus Christi area. I noticed you handle a lot of home and apartment clean-outs — and those jobs usually have boxes of books headed for the dumpster. I'm happy to come pick them up free of charge whenever a job has books, which saves you the volume and the tipping fees. Even a quick text when one comes up would be great. Can I leave you my number?`,
  estate_companies:`Hi [Name], I run a used-book resale business locally. Estate sales almost always have books left over on the last day — the stuff that doesn't sell and still has to be cleared. I'd be glad to set up a standing arrangement where I buy or take the unsold books off your hands at closeout, so you don't have to haul them. Worth a short call to see if it fits how you run your sales?`,
  schools:`Hi [Name], I run a local used-book resale business. I know libraries weed older titles at year-end and a lot of it ends up recycled or tossed. If your library is removing books from the collection this spring, I'd gladly pick them up — it saves you the disposal effort and keeps the books in circulation. Could you point me to whoever handles the library's discards? Thank you!`
};
const LBL_KIND={library_sale:'Library / Friends',estate_sale:'Estate Sale',book_lot:'Book Lot'};
const LBL_CAT={estate_companies:'Estate Co',junk_removal:'Junk / Hauler',schools:'School Library'};
const BADGE_KIND={library_sale:'b-library',estate_sale:'b-estate',book_lot:'b-lot'};

let SALES=[], LEADS=[];
const LS='bsd_crm';
const crm=JSON.parse(localStorage.getItem(LS)||'{}');
function saveCrm(){localStorage.setItem(LS,JSON.stringify(crm));}

function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

async function boot(){
  try{
    const [s,l]=await Promise.all([
      fetch('data/sales.json').then(r=>r.json()),
      fetch('data/leads.json').then(r=>r.json())
    ]);
    SALES=s.events||[]; LEADS=l.leads||[];
    document.getElementById('meta').textContent=
      `updated ${s.generated||l.generated||'—'} · ${SALES.length} live · ${LEADS.length} leads`;
    document.getElementById('n-feed').textContent=SALES.length;
    document.getElementById('n-leads').textContent=LEADS.length;
    renderFeed(); renderLeads();
  }catch(e){
    document.getElementById('feed-list').innerHTML=
      `<div class="err">Couldn't load data files. This page must be served over http (GitHub Pages or a local server), not opened directly from disk. (${esc(e.message)})</div>`;
    document.getElementById('meta').textContent='data not loaded';
  }
}

/* ---- LIVE FEED ---- */
let kFilter='all';
function renderFeed(){
  const q=(document.getElementById('feed-search').value||'').toLowerCase();
  const rows=SALES.filter(e=>(kFilter==='all'||e.kind===kFilter))
    .filter(e=>!q||(`${e.title} ${e.org} ${e.city}`).toLowerCase().includes(q));
  const el=document.getElementById('feed-list');
  if(!rows.length){el.innerHTML='<div class="empty">No matching sales. The scraper adds Craigslist, estate, and municipal-calendar hits as it runs.</div>';return;}
  el.innerHTML=rows.map(e=>{
    const when=e.date_start==='ongoing'?'Ongoing':(e.date_start||'TBD');
    const dist=e.distance_mi!=null?`· ${e.distance_mi} mi`:'';
    return `<div class="card">
      <div class="row">
        <span class="badge ${BADGE_KIND[e.kind]||'b-lot'}">${LBL_KIND[e.kind]||e.kind}</span>
        <span class="when">${esc(when)}</span>
        <span class="dist">${esc(e.city||'')} ${dist}</span>
      </div>
      <h3>${esc(e.title)}</h3>
      ${e.date_note?`<div class="detail"><b>${esc(e.date_note)}</b></div>`:''}
      ${e.details?`<div class="detail">${esc(e.details)}</div>`:''}
      <div class="lines">${esc(e.address||'')}${e.url?` · <a href="${esc(e.url)}" target="_blank">listing ↗</a>`:''} · <span style="color:var(--ink-soft)">${esc(e.source||'')}</span></div>
    </div>`;
  }).join('');
}

/* ---- LEADS ---- */
let cFilter='all';
function stars(p){p=p||3;return '★'.repeat(4-Math.min(p,3))+'☆'.repeat(Math.min(p,3)-1);}
function renderLeads(){
  const q=(document.getElementById('leads-search').value||'').toLowerCase();
  const rows=LEADS.filter(l=>(cFilter==='all'||l.category===cFilter))
    .filter(l=>!q||(`${l.name} ${l.city} ${l.notes}`).toLowerCase().includes(q));
  const el=document.getElementById('leads-list');
  if(!rows.length){el.innerHTML='<div class="empty">No matching leads.</div>';return;}
  el.innerHTML=rows.map(l=>{
    const st=crm[l.id]?.status||l.status||'new';
    const lc=crm[l.id]?.last_contacted||l.last_contacted||'';
    const on=crm[l.id]?.outreach_notes||l.outreach_notes||'';
    const phone=l.phone?l.phone.replace(/[^+\d]/g,''):'';
    return `<div class="card st-${st}">
      <div class="row">
        <span class="badge b-${l.category}">${l.school_type||LBL_CAT[l.category]||l.category}</span>
        <span class="stars" title="priority">${stars(l.priority)}</span>
        ${l.distance_mi!=null?`<span class="dist">${l.distance_mi} mi</span>`:''}
      </div>
      <h3>${esc(l.name)}</h3>
      <div class="lines">${esc(l.address||'')}</div>
      <div class="lines">${l.phone?`☏ <a href="tel:${phone}">${esc(l.phone)}</a>`:''}${l.website?` · <a href="${esc(l.website)}" target="_blank">website ↗</a>`:''}</div>
      ${l.notes?`<div class="notes">${esc(l.notes)}</div>`:''}
      ${l.outreach_window?`<div class="lines">⏰ reach out: ${esc(l.outreach_window)}</div>`:''}
      <div class="crm">
        <select data-id="${l.id}" data-f="status">
          ${['new','contacted','replied','sourcing','dead'].map(o=>`<option value="${o}" ${o===st?'selected':''}>${o}</option>`).join('')}
        </select>
        <input class="dt" type="date" data-id="${l.id}" data-f="last_contacted" value="${esc(lc)}">
        <button class="copy" data-pitch="${l.category}">copy pitch</button>
      </div>
      <textarea data-id="${l.id}" data-f="outreach_notes" placeholder="outreach notes…">${esc(on)}</textarea>
    </div>`;
  }).join('');
}

/* ---- events ---- */
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');
  const tab=t.dataset.tab;
  document.getElementById('feed').style.display=tab==='feed'?'':'none';
  document.getElementById('leads').style.display=tab==='leads'?'':'none';
});
document.querySelectorAll('[data-kfilter]').forEach(c=>c.onclick=()=>{
  document.querySelectorAll('[data-kfilter]').forEach(x=>x.classList.remove('on'));c.classList.add('on');
  kFilter=c.dataset.kfilter;renderFeed();
});
document.querySelectorAll('[data-cfilter]').forEach(c=>c.onclick=()=>{
  document.querySelectorAll('[data-cfilter]').forEach(x=>x.classList.remove('on'));c.classList.add('on');
  cFilter=c.dataset.cfilter;renderLeads();
});
document.getElementById('feed-search').oninput=renderFeed;
document.getElementById('leads-search').oninput=renderLeads;

document.getElementById('leads-list').addEventListener('change',e=>{
  const id=e.target.dataset.id,f=e.target.dataset.f;if(!id||!f)return;
  crm[id]=crm[id]||{};crm[id][f]=e.target.value;saveCrm();
  if(f==='status')renderLeads();
});
document.getElementById('leads-list').addEventListener('input',e=>{
  if(e.target.dataset.f==='outreach_notes'){const id=e.target.dataset.id;crm[id]=crm[id]||{};crm[id].outreach_notes=e.target.value;saveCrm();}
});
document.getElementById('leads-list').addEventListener('click',e=>{
  if(e.target.classList.contains('copy')){
    navigator.clipboard.writeText(PITCH[e.target.dataset.pitch]||'');
    e.target.textContent='copied ✓';setTimeout(()=>e.target.textContent='copy pitch',1200);
  }
});
document.getElementById('export').onclick=()=>{
  const merged=LEADS.map(l=>({...l,...(crm[l.id]||{})}));
  const blob=new Blob([JSON.stringify({generated:new Date().toISOString().slice(0,10),leads:merged},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='leads.json';a.click();
};

boot();
</script>
</body>
</html>
