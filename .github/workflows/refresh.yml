name: Refresh book sources

on:
  schedule:
    - cron: "0 13 * * 1"      # every Monday 13:00 UTC (~7–8am Central)
  workflow_dispatch: {}        # lets you run it on demand from the Actions tab

permissions:
  contents: write              # required so the job can commit data/*.json back

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scraper/requirements.txt

      - name: Build sales.json + leads.json
        run: python scraper/build_data.py

      - name: Commit refreshed data
        run: |
          git config user.name  "book-source-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/sales.json data/leads.json data/libraries.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Refresh book sources $(date -u +%F)"
            git push
          fi
